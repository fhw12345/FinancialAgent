# Production-specific overrides for ACK (Alibaba Cloud)
# Cluster: klinecubic-financialagent (cn-shanghai)
#
# Architecture: hostNetwork mode (no SLB/LoadBalancer)
#   - nginx-ingress runs directly on node with public EIP (106.14.61.31)
#   - Node must be labeled: kubectl label node <node> ingress=true
#   - Eliminates SLB cost (~$15/month)
#   - Trade-off: Single point of failure (no HA), but acceptable for current scale
#
# Updated: 2026-01-29 (ACK cluster recovery)

controller:
  # Single replica pinned to the node with public EIP
  replicaCount: 1

  # hostNetwork: bind directly to node's ports 80 and 443
  # This replaces LoadBalancer/SLB entirely
  hostNetwork: true
  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  # Required for hostNetwork: resolve cluster DNS from host network namespace
  dnsPolicy: ClusterFirstWithHostNet

  # Pin to the node with public EIP
  # Label the node first: kubectl label node <node-name> ingress=true
  nodeSelector:
    ingress: "true"

  # Resource limits for production workload
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # No anti-affinity needed - single replica pinned to specific node
  # (removed podAntiAffinity from previous SLB-based config)

  # Production-grade metrics and monitoring
  metrics:
    enabled: true
    serviceMonitor:
      enabled: false  # Enable when Prometheus operator is installed

  # Production logging
  logLevel: info  # Use 'debug' for troubleshooting
