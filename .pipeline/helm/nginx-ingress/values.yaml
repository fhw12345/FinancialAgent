# Base nginx-ingress configuration
# Shared across all environments
# Chart: ingress-nginx/ingress-nginx v4.14.0
#
# Architecture (2026-01-29):
#   Production uses hostNetwork mode (no SLB/LoadBalancer) to save costs.
#   nginx-ingress binds directly to ports 80/443 on the node with public EIP.
#   See values-prod.yaml for production-specific hostNetwork settings.

controller:
  # Use Alibaba Cloud registry for faster pulls in China
  image:
    registry: registry.cn-hangzhou.aliyuncs.com
    image: google_containers/nginx-ingress-controller
    tag: v1.9.4
    # IMPORTANT: Don't use SHA digests - they're not mirrored in Alibaba Cloud registry
    digest: ""

  # Disable admission webhooks
  # Reason: Image pull failures due to SHA digest not available in registry
  # Impact: Minimal - admission webhook validates Ingress resources but is optional
  admissionWebhooks:
    enabled: false

  # Default service configuration
  # NOTE: In production (hostNetwork mode), the service is not used for external traffic.
  # Traffic flows: Internet → Node EIP:80/443 → hostNetwork nginx pod → ClusterIP services
  service:
    type: ClusterIP
    annotations: {}
